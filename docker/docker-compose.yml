version: '3.9'

services:
  db:
    image: postgres:16
    container_name: craftflow_db
    restart: always
    environment:
      POSTGRES_DB: craftflow_db
      POSTGRES_USER: craftflow_user
      POSTGRES_PASSWORD: craftflow_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: